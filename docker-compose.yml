services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '127.0.0.1:5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bootstrap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bootstrap']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
